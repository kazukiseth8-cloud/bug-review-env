name: bug-review-env
version: "1.0.0"
description: >
  An OpenEnv environment where an LLM agent reviews Python code snippets
  and identifies bugs. Three tasks of increasing difficulty: easy (off-by-one),
  medium (SQL injection / hardcoded secret), hard (race condition).
  Each task is graded 0.0–1.0 with partial credit for line, type, and explanation.

author: Dan2000000
repository: https://github.com/kazukiseth8-cloud/bug-review-env
space: https://huggingface.co/spaces/Dan2000000/bug-review-env

tags:
  - openenv
  - code-review
  - security
  - bug-detection
  - real-world

tasks:
  - name: find_bug_easy
    description: Identify an off-by-one error in a list indexing function
    difficulty: easy
    max_steps: 1
    score_range: [0.0, 1.0]

  - name: find_bug_medium
    description: Identify SQL injection or hardcoded secret in authentication code
    difficulty: medium
    max_steps: 1
    score_range: [0.0, 1.0]

  - name: find_bug_hard
    description: Identify a race condition in multi-threaded banking code
    difficulty: hard
    max_steps: 1
    score_range: [0.0, 1.0]

action_space:
  type: object
  fields:
    buggy_line:
      type: integer
      description: Line number (1-indexed) where the bug is located
    bug_type:
      type: string
      enum:
        - off_by_one
        - null_dereference
        - sql_injection
        - hardcoded_secret
        - race_condition
        - logic_error
        - insecure_deserialization
        - other
      description: Category of bug identified
    explanation:
      type: string
      description: Free-text explanation of the bug and fix

observation_space:
  type: object
  fields:
    code_snippet:
      type: string
      description: Python code containing the bug
    task_name:
      type: string
      description: Name of the current task
    instructions:
      type: string
      description: What the agent is asked to identify
    feedback:
      type: string
      description: Grader feedback after step (empty on reset)
    done:
      type: boolean
      description: Whether the episode has ended

env_vars:
  API_BASE_URL:
    description: LLM API endpoint (OpenAI-compatible)
    default: "https://router.huggingface.co/v1"
  MODEL_NAME:
    description: Model identifier for inference
    default: "Qwen/Qwen2.5-72B-Instruct"
  HF_TOKEN:
    description: Hugging Face API token
    required: true
